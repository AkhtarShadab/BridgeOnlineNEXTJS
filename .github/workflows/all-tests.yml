name: All Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  unit-and-socket:
    name: Layer 1 (Unit) + Layer 3 (Socket.io)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Layer 1 — Vitest unit tests
        run: npm test

      - name: Layer 3 — Socket.io integration tests
        run: npm run test:socket

  db-integration:
    name: Layer 2 (DB Integration)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: bridgeonline_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://test:test@localhost:5433/bridgeonline_test?schema=public
      DIRECT_URL: postgresql://test:test@localhost:5433/bridgeonline_test?schema=public
      NEXTAUTH_SECRET: test-secret-32-chars-for-testing!!
      NEXTAUTH_URL: http://localhost:3000
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Push schema to test DB
        run: npx prisma db push --skip-generate
        env:
          DATABASE_URL: postgresql://test:test@localhost:5433/bridgeonline_test?schema=public

      - name: Layer 2 — DB integration tests
        run: npm run test:db

  e2e:
    name: Layer 4+5 (Playwright E2E + WebRTC)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: bridgeonline_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://test:test@localhost:5433/bridgeonline_test?schema=public
      DIRECT_URL: postgresql://test:test@localhost:5433/bridgeonline_test?schema=public
      NEXTAUTH_SECRET: test-secret-32-chars-for-testing!!
      NEXTAUTH_URL: http://localhost:3000
      NEXT_PUBLIC_SOCKET_URL: http://localhost:3000
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Push schema to test DB
        run: npx prisma db push --skip-generate
        env:
          DATABASE_URL: postgresql://test:test@localhost:5433/bridgeonline_test?schema=public

      - name: Install Playwright system dependencies
        run: sudo npx playwright install-deps chromium

      - name: Install Playwright browsers
        run: npx playwright install chromium

      - name: Layer 4+5 — Playwright E2E tests
        run: npm run test:e2e

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
